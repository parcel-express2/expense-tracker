<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — مدير المصروفات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Cairo', sans-serif;
  background: #0f1117;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -200px; right: -200px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(79,142,247,.15) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed;
  bottom: -200px; left: -200px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(167,139,250,.1) 0%, transparent 70%);
  pointer-events: none;
}
.card {
  background: #1a1d27;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 24px;
  padding: 44px 38px;
  width: 100%;
  max-width: 390px;
  box-shadow: 0 32px 80px rgba(0,0,0,.5);
  position: relative;
  z-index: 1;
}
.logo-wrap { text-align: center; margin-bottom: 28px; }
.logo-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #4f8ef7, #a78bfa);
  border-radius: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(79,142,247,.3);
}
h1 { font-size: 1.4rem; font-weight: 900; color: #f1f5f9; margin-bottom: 4px; text-align: center; }
.sub { font-size: .83rem; color: #7c8db5; text-align: center; margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: .78rem;
  font-weight: 700;
  color: #7c8db5;
  margin-bottom: 6px;
  letter-spacing: .04em;
  text-align: right;
}
.form-group input {
  width: 100%;
  padding: 12px 15px;
  background: #21253a;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 12px;
  color: #f1f5f9;
  font-size: .95rem;
  font-family: inherit;
  transition: border-color .2s, box-shadow .2s;
  outline: none;
  text-align: right;
}
.form-group input[type="password"] {
  text-align: center;
  letter-spacing: 6px;
  font-size: 1.1rem;
}
.form-group input::placeholder { color: #3d4a6b; letter-spacing: 0; }
.form-group input:focus {
  border-color: #4f8ef7;
  box-shadow: 0 0 0 3px rgba(79,142,247,.12);
}
.pin-hint { font-size: .72rem; color: #3d4a6b; margin-top: 5px; text-align: center; }
.btn-primary {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #4f8ef7, #a78bfa);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: .95rem;
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .2s, transform .1s;
  margin-top: 4px;
}
.btn-primary:hover  { opacity: .85; }
.btn-primary:active { transform: scale(.98); }
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 22px 0;
  color: #3d4a6b;
  font-size: .8rem;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,.06);
}
.link-btn {
  display: block;
  padding: 12px;
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 12px;
  color: #4f8ef7;
  font-weight: 700;
  font-size: .9rem;
  text-decoration: none;
  text-align: center;
  transition: background .15s;
}
.link-btn:hover { background: rgba(79,142,247,.08); }
.flash {
  padding: 10px 14px;
  border-radius: 10px;
  font-size: .84rem;
  font-weight: 600;
  margin-bottom: 16px;
  border: 1px solid;
}
.flash.success { background: rgba(0,214,143,.1); color: #00d68f; border-color: rgba(0,214,143,.2); }
.flash.error   { background: rgba(255,77,109,.1); color: #ff4d6d; border-color: rgba(255,77,109,.2); }
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">💰</div>
    <h1>مدير المصروفات</h1>
    <div class="sub">سجّل دخولك لمتابعة ميزانيتك</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label>الاسم</label>
      <input type="text" name="name" placeholder="اكتب اسمك" required autocomplete="off">
    </div>
    <div class="form-group">
      <label>رمز PIN</label>
      <input type="password" name="pin" placeholder="••••" maxlength="4" pattern="[0-9]{4}" required inputmode="numeric">
      <div class="pin-hint">4 أرقام فقط</div>
    </div>
    <button type="submit" class="btn-primary">دخول ←</button>
  </form>

  <div class="divider">أو</div>
  <a href="/register" class="link-btn">+ إنشاء حساب جديد</a>
</div>
</body>
</html>
